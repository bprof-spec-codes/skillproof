version: '3.8'

services:
  skillproof-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: skillproof-mssql
    restart: unless-stopped
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Aa1.12345678
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql

volumes:
  mssql_data:

<section class="job-detail-page py-4">
  <div class="container">
    <a class="back-link" routerLink="/home">&larr; Back to jobs</a>

    <div class="job-detail-card mt-3">
      <div *ngIf="isLoading" class="state-block">
        Loading job details...
      </div>

      <div *ngIf="!isLoading && errorMessage" class="state-block state-error">
        <p class="mb-3">{{ errorMessage }}</p>
        <a class="btn btn-outline-secondary" routerLink="/home">Back to Home</a>
      </div>

      <ng-container *ngIf="!isLoading && !errorMessage && job">
        <div class="bookmark-wrap">
          <i class="bi bi-bookmark bookmark-icon" aria-hidden="true"></i>
        </div>

        <h1 class="job-title mb-3">{{ job.title }}</h1>

        <div class="job-description mb-4" [innerHTML]="job.description"></div>

        <div class="tags-row mb-4">
          <span class="tag-pill employment-pill">
            <i class="bi bi-briefcase"></i>
            {{ getEmploymentTypeLabel(job.EmploymentType) }}
          </span>

          <span *ngFor="let tag of job.tags" class="tag-pill">
            {{ tag }}
          </span>
        </div>

        <div class="footer-row">
          <div class="meta-group">
            <div class="company-name">Company</div>
            <div class="meta-line">
              <span><i class="bi bi-geo-alt-fill me-1"></i>{{ job.location || 'Unknown location' }}</span>
              <span><i class="bi bi-clock me-1"></i>{{ getTimeAgo(job.createdAt) }}</span>
            </div>
          </div>

          <div class="actions">
            <button class="submit-btn" type="button" (click)="applyNow()">
              Submit your application
            </button>
            <button class="share-btn" type="button" (click)="shareJob()" aria-label="Share job">
              <i class="bi bi-share"></i>
            </button>
          </div>
        </div>
      </ng-container>
    </div>
  </div>
</section>

<div class="question-fill-in-the-blank">
  <p class="question-text mb-3">{{ question.questionText }}</p>

  <textarea
    class="answer-input"
    rows="8"
    [attr.maxlength]="maxLength"
    [value]="responseText"
    (input)="onInput($any($event.target).value)"
    placeholder="Write your answer..."
  ></textarea>

  <div class="char-counter">{{ responseText.length }} / {{ maxLength }}</div>
</div>

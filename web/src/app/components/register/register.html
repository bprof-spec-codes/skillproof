<div class="d-flex align-items-center justify-content-center home-register">
  <div class="container">
    <div class="row justify-content-center">
      <div class="card border-0 border-card">
        <div class="card-body p-3">
          <div class="mb-4">
            <h1 class="login-title">Embark on your job searching</h1>
            <p class="login-smalltext">Please fill in your details below</p>
          </div>

          <form (ngSubmit)="onRegister()">
            
            <div class="row">
              <div class="col-md-6 mb-4">
                <label for="firstName" class="form-label label-text">First Name</label>
                <input type="text" id="firstName" class="form-control form-control-custom form-field"
                  [(ngModel)]="firstName" name="firstName" placeholder="John" required />
              </div>
              
              <div class="col-md-6 mb-4">
                <label for="lastName" class="form-label label-text">Last Name</label>
                <input type="text" id="lastName" class="form-control form-control-custom form-field"
                  [(ngModel)]="lastName" name="lastName" placeholder="Doe" required />
              </div>
            </div>

            <div class="mb-4">
              <label for="email" class="form-label label-text">Email address</label>
              <input type="email" id="email" class="form-control form-control-custom form-field"
                [(ngModel)]="email" name="email" placeholder="Exampleaddress@example.com" required />
            </div>

            <div class="mb-4">
              <label for="password" class="form-label label-text">Password</label>
              <input type="password" id="password" class="form-control form-control-custom form-field"
                [(ngModel)]="password" name="password" placeholder="••••••" required />
            </div>

            <div class="mb-4">
              <label for="confirmPassword" class="form-label label-text">Confirm Password</label>
              <input type="password" id="confirmPassword" class="form-control form-control-custom form-field"
                [(ngModel)]="confirmPassword" name="confirmPassword" placeholder="••••••" required />
            </div>

            <div class="d-grid mt-4">
              <button type="submit" class="btn login-btn" [disabled]="loading">
                {{ loading ? 'Registering...' : 'Register' }}
              </button>
            </div>

            <div class="mt-3 text-center">
              <p *ngIf="error" class="text-danger fw-bold mb-0">{{ error }}</p>
              <p *ngIf="success" class="text-success fw-bold mb-0">{{ success }}</p>
            </div>

          </form>

          <hr class="line mt-4">

          <div class="mt-4">
            <p class="smalltext-center">Already have an account? <a href="/login" class="smalltext-center underline">Login</a></p>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>

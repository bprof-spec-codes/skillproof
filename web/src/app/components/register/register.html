<form (ngSubmit)="onRegister()">

  <h2>Register</h2>

  <!-- First Name -->
  <input
    type="text"
    [(ngModel)]="firstName"
    name="firstName"
    placeholder="First Name"
    required
  />

  <!-- Last Name -->
  <input
    type="text"
    [(ngModel)]="lastName"
    name="lastName"
    placeholder="Last Name"
    required
  />

  <!-- Email -->
  <input
    type="email"
    [(ngModel)]="email"
    name="email"
    placeholder="Email"
    required
  />

  <!-- Password -->
  <input
    type="password"
    [(ngModel)]="password"
    name="password"
    placeholder="Password"
    required
  />

  <!-- Confirm Password -->
  <input
    type="password"
    [(ngModel)]="confirmPassword"
    name="confirmPassword"
    placeholder="Confirm Password"
    required
  />

  <!-- Submit -->
  <button type="submit" [disabled]="loading">
    {{ loading ? 'Registering...' : 'Register' }}
  </button>

  <!-- Error -->
  <p *ngIf="error" style="color: red;">
    {{ error }}
  </p>

  <!-- Success -->
  <p *ngIf="success" style="color: green;">
    {{ success }}
  </p>

</form>

<div class="container py-5">

  <div class="card p-4 mx-auto" style="max-width: 600px;">
    
    <h3 class="mb-4 text-center">Edit Profile</h3>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">

      <div class="mb-3">
        <label>Email</label>
        <input class="form-control" formControlName="email">
      </div>

      <div class="mb-3">
        <label>First Name</label>
        <input class="form-control" formControlName="firstName">
      </div>

      <div class="mb-3">
        <label>Last Name</label>
        <input class="form-control" formControlName="lastName">
      </div>

      <div class="mb-3">
        <label>Headline</label>
        <input class="form-control" formControlName="headline">
      </div>

      <div class="mb-3">
        <label>Bio</label>
        <textarea class="form-control" formControlName="bio"></textarea>
      </div>

      <div class="mb-3">
        <label>Profile Image (JPG/PNG)</label>
        <input type="file" class="form-control" (change)="onFileSelected($event)">
      </div>

      <div class="text-center" style="padding: 0.8rem;">
        <button class="btn btn-primary" type="submit">
          Save Changes
        </button>
      </div>

    </form>

    <div class="mt-4">
      <label>Skills</label>

      <input
        class="form-control"
        [ngModel]="skillInput"
        (ngModelChange)="skillInput = $event"
        (keydown.enter)="addSkill()"
        placeholder="Type a skill and press Enter"
      />

      <div class="mt-3 d-flex flex-wrap gap-2">
        <span
          *ngFor="let skill of skills; let i = index"
          class="badge bg-secondary"
        >
          {{ skill }}
          <button
            type="button"
            class="btn-close btn-close-white ms-2"
            (click)="removeSkill(i)"
          ></button>
        </span>
      </div>

      <div class="text-center mt-3" style="padding: 0.8rem;">
        <button class="btn btn-success" (click)="saveSkills()">
          Save Skills
        </button>
      </div>
    </div>

  </div>

  

</div>
